name: CI/CD QA Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  qa-gate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psycopg2-binary

    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: latest

    - name: Start Local Supabase
      run: supabase start
      
    - name: Run RLS Security Gate
      run: python tests/test_rls.py

    - name: Run Python Baseline Regression
      run: python tests/simulacion_100_viajes.py

    - name: Run Python vs PL/pgSQL Drift Test
      run: python tests/test_asignacion_drift.py
